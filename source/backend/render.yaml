# Render Blueprint — connect repo at https://dashboard.render.com
# Root directory: source/backend (set in Render dashboard or use this blueprint)

services:
  - type: web
    name: se-sitrep-api
    runtime: node
    rootDir: source/backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: OPENAI_API_KEY
        sync: false
