# Deploy: frontend → GitHub Pages; backend → Render (via deploy hook).
# GitHub Pages only hosts static files — Node API runs on Render (free tier).

name: Deploy

on:
  push:
    branches: [main, master]
    paths:
      - "source/mvp/**"
      - "source/backend/**"
      - ".github/workflows/deploy.yml"
      - "source/backend/render.yaml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-backend:
    name: Backend — test & deploy (Render)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: source/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: source/backend/package-lock.json

      - run: npm ci
      - run: npm test

      - name: Trigger Render deploy (if hook configured)
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            curl -fsSL -X POST "$RENDER_DEPLOY_HOOK"
          else
            echo "::notice::Skip Render deploy — add secret RENDER_DEPLOY_HOOK (see docs/DEPLOY.md)"
          fi

  deploy-frontend:
    name: Frontend — GitHub Pages
    runs-on: ubuntu-latest
    needs: deploy-backend
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Inject production API URL
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: |
          if [ -z "$API_BASE_URL" ]; then
            echo "::error::Set repository variable API_BASE_URL to your Render URL (e.g. https://se-sitrep-api.onrender.com)"
            exit 1
          fi
          # Replace default API host (index uses URL params || 'http://localhost:3001')
          sed -i "s|http://localhost:3001|${API_BASE_URL}|g" source/mvp/index.html
          grep -n "apiBaseUrl" source/mvp/index.html
          if grep -q 'localhost:3001' source/mvp/index.html; then
            echo "::error::API URL injection failed — index.html still contains localhost:3001"
            exit 1
          fi
          if ! grep -q "${API_BASE_URL}" source/mvp/index.html; then
            echo "::error::index.html does not contain API_BASE_URL (${API_BASE_URL})"
            exit 1
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: source/mvp

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
