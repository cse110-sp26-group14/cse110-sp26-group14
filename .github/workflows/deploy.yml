# Deploy: GitHub Pages (frontend source/mvp) + Cloudflare Worker (API source/worker).

name: Deploy

on:
  push:
    branches: [main, master]
    paths:
      - "source/mvp/**"
      - "source/worker/**"
      - "source/backend/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-worker:
    name: API — Cloudflare Worker + D1
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: source/worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: source/worker/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Unit tests
        run: npm test

      - name: Configure D1 database id
        env:
          D1_DATABASE_ID: ${{ vars.D1_DATABASE_ID }}
        run: |
          if [ -z "$D1_DATABASE_ID" ]; then
            echo "::error::Set repository variable D1_DATABASE_ID (from: npx wrangler d1 create se-sitrep)"
            exit 1
          fi
          sed -i "s/REPLACE_WITH_YOUR_D1_DATABASE_ID/${D1_DATABASE_ID}/g" wrangler.toml
          grep database_id wrangler.toml

      - name: Deploy Worker to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Add GitHub secret CLOUDFLARE_API_TOKEN and variable CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi
          npx wrangler deploy

  deploy-github-pages:
    name: Frontend — GitHub Pages
    runs-on: ubuntu-latest
    needs: deploy-worker
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Inject Cloudflare Worker API URL
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: |
          if [ -z "$API_BASE_URL" ]; then
            echo "::error::Set repository variable API_BASE_URL to your Worker URL (e.g. https://se-sitrep-api.xxx.workers.dev)"
            exit 1
          fi
          sed -i "s|__API_BASE_URL__|${API_BASE_URL}|g" source/mvp/index.html
          echo "=== apiBaseUrl after inject ==="
          grep -n "apiBaseUrl" source/mvp/index.html
          if grep -q '__API_BASE_URL__' source/mvp/index.html; then
            echo "::error::API URL inject failed"
            exit 1
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: source/mvp

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
