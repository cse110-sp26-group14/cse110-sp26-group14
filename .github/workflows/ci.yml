name: CI

on:
  push:
    branches: [main, master]
    paths:
      - "source/prototype-02/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "source/prototype-02/**"
      - ".github/workflows/ci.yml"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, unit tests, E2E placeholder
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: source/prototype-02

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: source/prototype-02/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (JS, CSS, HTML)
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: E2E placeholder
        run: npm run test:e2e
